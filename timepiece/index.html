<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>计时器</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/weui/1.1.3/style/weui.min.css">
    <style>
        /* 默认样式 */
        .container {
            width: 800px;
            margin: auto;
        }
        /* 当屏幕宽度小于600px时 */
        @media (max-width: 600px) {
            .container {
                width: 100%;
            }
        }
        .parent {
            display: flex;
            flex-wrap: wrap; /* 允许子元素换行 */
        }
        .child {
            flex: 1 1 50%; /* 初始占据50%宽度 */
            @media (max-width: 600px) {
                flex: 1 1 100%; /* 在小屏幕上占据100%宽度 */
            }
        }
        .weui-btn {
            height: 150px; /* 设置高度 */
            font-size: 46px; /* 设置字体大小 */
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        #timer {
            font-size: 200px;
            text-align: center;
            margin-top: 5%;
            color: black; /* 默认字体颜色 */
        }
        #timer.countdown {
            color: #e44240; /* 倒计时期间字体颜色 */
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        #records {
            margin-top: 20px;
            text-align: center;
        }
        #summary {
            margin-top: 20px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<!-- 显示计时器的地方 -->
<div id="timer" class="weui-cell__bd">0</div>

<!-- 设置时间和总结信息 -->
<label class="weui-cell weui-cell_active">
    <div class="weui-cell__hd"><span class="weui-label">时间</span></div>
    <div class="weui-cell__bd">
        <input id="initialTime" class="weui-input" placeholder="可以坚持的秒数"/>
    </div>
</label>

<!-- 控制按钮 -->
<div class="controls weui-btn-area">
    <button type="button" class="weui-btn weui-btn_primary" id="startButton" onclick="startTimer()">开始</button>
    <button type="button" class="weui-btn weui-btn_warn hidden" id="stopButton" onclick="stopTimer()">停止</button>
</div>

<div id="summary" class="weui-cell__bd"></div>

<!-- 显示记录的地方 -->
<div id="records" class="weui-media-box weui-media-text"></div>

<script>
    // 获取显示时间的元素
    const timerDisplay = document.getElementById('timer');
    const initialTimeInput = document.getElementById('initialTime');
    const recordsDisplay = document.getElementById('records');
    const summaryDisplay = document.getElementById('summary');
    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');

    // 计时器相关变量
    let timeLeft = 0;
    let initialTime = 0;
    let intervalId = null;
    const records = [];

    // 开始计时
    function startTimer() {
        initialTime = parseInt(initialTimeInput.value, 10); // 获取初始时间
        timeLeft = 0; // 重置时间为 0

        if (intervalId === null) {
            // 倒计时三秒
            let countdown = 3;
            const countdownInterval = setInterval(() => {
                if (countdown >= 0) {
                    timerDisplay.textContent = countdown--;
                    timerDisplay.classList.add('countdown'); // 设置倒计时期间的样式
                } else {
                    clearInterval(countdownInterval);
                    timerDisplay.classList.remove('countdown'); // 恢复默认样式
                    playSound1(); // 在这里播放声音提示
                    intervalId = setInterval(() => {
                        timeLeft++; // 正向计时
                        timerDisplay.textContent = timeLeft;
                        if (timeLeft === initialTime) {
                            playSound2(); // 播放声音提示
                        }
                    }, 1000);
                }
            }, 1000);
        }
        startButton.classList.add('hidden');
        stopButton.classList.remove('hidden');
    }

    // 播放声音提示
    const audio1 = new Audio('/mp3/1.mp3'); // 替换为实际的声音文件URL
    const audio2 = new Audio('/mp3/2.mp3'); // 替换为实际的声音文件URL
    function playSound1() {
        audio1.play().catch(error => {
            console.error("播放声音失败:", error);
        });
    }
    function playSound2() {
        audio2.play().catch(error => {
            console.error("播放声音失败:", error);
        });
    }

    // 停止计时并记录
    function stopTimer() {
        if (intervalId !== null) {
            clearInterval(intervalId);
            intervalId = null;
            records.push({
                time: timeLeft,
                count: records.length + 1
            });
            displayRecords();
            resetTimer(); // 停止后立即重置时间
            startButton.classList.remove('hidden');
            stopButton.classList.add('hidden');
            displaySummary(); // 更新总结信息
        }
    }

    // 重置计时
    function resetTimer() {
        if (intervalId !== null) {
            clearInterval(intervalId);
            intervalId = null;
        }
        timeLeft = 0;
        timerDisplay.textContent = "0";
        timerDisplay.classList.remove('countdown'); // 恢复默认样式
    }

    // 显示记录
    function displayRecords() {
        let recordsHtml = '';
        for (const record of records.slice().reverse()) {
            recordsHtml += `
                    <div class="weui-form__tips">
                        <span>第 ${record.count} 次: ${record.time} 秒</span>
                    </div>
                `;
        }
        recordsDisplay.innerHTML = recordsHtml;
    }

    // 显示总结
    function displaySummary() {
        const totalTimes = records.length;
        const totalTime = records.reduce((acc, curr) => acc + curr.time, 0);
        const averageTime = totalTime / totalTimes;

        summaryDisplay.innerHTML = `
                <p class="form__tips">平均时间：${averageTime.toFixed(2)} 秒</p>
            `;
    }
</script>

</body>
</html>
